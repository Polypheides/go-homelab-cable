<div id="status-wrapper">
    {{ range .Channels }}
    <article id="appliance-{{ .ID }}" class="appliance" data-id="{{ .ID }}" data-playing="{{ .Playing }}">
        <div class="logo">
            {{ $.Name }}<div class="logo-sub">{{ $.Owner }}</div>
        </div>
        <div id="status-holder-{{ .ID }}" class="status-holder">
            <div id="status-lcd-{{ .ID }}" class="status-lcd led led-old">
                <div class="lcd-content">
                    <span class="lcd-text">{{ .Playing }}</span>
                </div>
            </div>
        </div>
        <div id="controls-{{ .ID }}" class="controls">
            <button hx-put="/htmx/channels/{{ .ID }}/previous" 
                    hx-swap="none"
                    hx-on::after-request="window.location.reload()"
                    class="metal linear small"><</button>

            <button hx-put="/htmx/channels/{{ .ID }}/tune" 
                    hx-swap="none"
                    hx-on::after-request="window.location.reload()"
                    class="metal linear small tune {{ if .Tuned }}active{{ end }}">TUNE</button>

            <button hx-put="/htmx/channels/{{ .ID }}/next" 
                    hx-swap="none"
                    hx-on::after-request="window.location.reload()"
                    class="metal linear small">></button>
            <div class="button-indicator"></div>
        </div>
    </article>
    {{ end }}
</div>
